<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facilitator Sign In — AfriversalAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <style>
    :root { --navy: #1A3A5C; }
    body { background: #EEF1F0; min-height: 100vh; margin: 0; }
    .al-top { background: var(--green-dark); color: #fff; padding: 14px 0; }
    .al-top__inner { max-width: 1180px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 14px; }
    .al-top__inner img { height: 30px; width: auto; }
    .al-top__tag { font-size: 0.72em; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); border-left: 1px solid rgba(255,255,255,0.25); padding-left: 14px; }
    .al-wrap { max-width: 440px; margin: 60px auto; padding: 0 16px; }
    .al-card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 36px 34px; box-shadow: var(--shadow-md); }
    .al-card__eyebrow { font-size: 0.72em; font-weight: 800; text-transform: uppercase; letter-spacing: 1.6px; color: var(--gold-dark); margin-bottom: 8px; }
    .al-card h1 { font-size: 1.5em; font-weight: 800; color: var(--green-dark); margin: 0 0 6px; }
    .al-card p.lead { font-size: 0.9em; color: var(--muted); margin: 0 0 22px; line-height: 1.55; }
    .al-field { margin-bottom: 16px; }
    .al-field label { display: block; font-size: 0.82em; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .al-field input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 11px 13px; font-family: inherit; font-size: 0.95em; }
    .al-field input:focus { outline: none; border-color: var(--green-mid); }
    .al-err { display: none; background: #FFF5F5; border: 1px solid #FCA5A5; color: #7F1D1D; font-size: 0.85em; border-radius: var(--radius); padding: 10px 13px; margin-bottom: 16px; line-height: 1.5; }
    .al-foot { font-size: 0.8em; color: var(--muted); text-align: center; margin-top: 18px; }
    .al-foot a { color: var(--green-mid); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>

<div class="al-top">
  <div class="al-top__inner">
    <a href="index.html"><img src="assets/logo-white.png" alt="AfriversalAI" /></a>
    <span class="al-top__tag">Instructor Console</span>
  </div>
</div>

<div class="al-wrap">
  <div class="al-card">
    <div class="al-card__eyebrow">🎓 Facilitator Access</div>
    <h1>Sign in to the console</h1>
    <p class="lead">For AfriversalAI facilitators and administrators. Use your facilitator account to manage students, progress, and messages.</p>

    <div class="al-err" id="login-err"></div>

    <form id="al-form" onsubmit="return doLogin(event)">
      <div class="al-field">
        <label for="email">Facilitator email</label>
        <input type="email" id="email" name="email" required placeholder="you@afriversal.ai" autocomplete="email" />
      </div>
      <div class="al-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Your password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn--primary btn--lg" style="width:100%; margin-top:6px;" id="submit-btn">Sign in to the console &rarr;</button>
    </form>

    <div class="al-foot">
      Are you a learner? <a href="login.html">Go to the learner sign-in &rarr;</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/admins.js"></script>
<script>
  getSession().then(function (session) {
    if (session && session.user && window.isAdminEmail(session.user.email)) {
      window.location.href = 'admin.html';
    }
  });

  async function doLogin(e) {
    e.preventDefault();
    var errEl = document.getElementById('login-err');
    var btn = document.getElementById('submit-btn');
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    errEl.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Signing in…';

    var authedData;
    try {
      authedData = await afSignIn(email, password);
    } catch (err) {
      errEl.textContent = err.message || 'Sign in failed. Check your email and password.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign in to the console →';
      return false;
    }

    var authedEmail = (authedData && authedData.user && authedData.user.email) || email;
    if (!window.isAdminEmail(authedEmail)) {
      try { await _supabase.auth.signOut(); } catch (_) {}
      errEl.innerHTML = 'That account doesn’t have facilitator access. If you’re a learner, use the <a href="login.html" style="color:#7F1D1D;font-weight:700;">learner sign-in</a>. To request access, contact <a href="mailto:ask@afriversal.ai" style="color:#7F1D1D;font-weight:700;">ask@afriversal.ai</a>.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign in to the console →';
      return false;
    }

    window.location.href = 'admin.html';
    return false;
  }
</script>
</body>
</html>
