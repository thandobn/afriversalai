<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set a New Password — AfriversalAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card { background: white; border-radius: var(--radius-lg); padding: 48px 44px; width: 100%; max-width: 460px; box-shadow: var(--shadow-md); }
    .auth-logo { display: block; height: 52px; width: auto; margin-bottom: 28px; }
    .auth-card h1 { font-size: 1.5em; font-weight: 800; color: var(--green-dark); margin-bottom: 6px; }
    .auth-card p.sub { color: var(--muted); font-size: 0.9em; margin-bottom: 28px; line-height: 1.6; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85em; font-weight: 600; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 0.92em; color: var(--text); background: white; }
    .form-group input:focus { outline: none; border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(45,106,79,0.1); }
    .auth-error { display: none; background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; border-radius: var(--radius); padding: 12px 14px; font-size: 0.85em; margin-bottom: 16px; }
    .auth-ok { display: none; background: var(--green-pale); border: 1px solid var(--green-light); color: var(--green-dark); border-radius: var(--radius); padding: 14px 16px; font-size: 0.88em; margin-bottom: 16px; line-height: 1.6; }
    .auth-footer { margin-top: 24px; text-align: center; font-size: 0.85em; color: var(--muted); }
    .auth-footer a { color: var(--green-mid); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body class="bg-pale">

<nav class="nav">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo"><img src="assets/logo.png" alt="AfriversalAI" class="nav__logo-img"></a>
    <ul class="nav__links">
      <li><a href="index.html">Home</a></li>
      <li class="nav__login"><a href="login.html">Log in</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <img src="assets/logo.png" alt="AfriversalAI" class="auth-logo" />
    <h1>Set a new password</h1>
    <p class="sub" id="rp-sub">Verifying your reset link…</p>

    <div id="auth-error" class="auth-error" role="alert"></div>
    <div id="auth-ok" class="auth-ok" role="status"></div>

    <form id="rp-form" onsubmit="setNewPassword(event)" style="display:none;">
      <div class="form-group">
        <label for="pw1">New password</label>
        <input type="password" id="pw1" required placeholder="At least 8 characters" autocomplete="new-password" minlength="8" />
      </div>
      <div class="form-group">
        <label for="pw2">Confirm new password</label>
        <input type="password" id="pw2" required placeholder="Re-enter password" autocomplete="new-password" minlength="8" />
      </div>
      <button type="submit" class="btn btn--primary btn--lg" style="width:100%; margin-top:8px;" id="rp-btn">Update password →</button>
    </form>

    <div class="auth-footer">
      <a href="login.html">Back to sign in</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2"></script>
<script src="assets/supabase-config.js"></script>
<script>
  var RP_READY = false;

  function showForm() {
    if (RP_READY) return;
    RP_READY = true;
    document.getElementById('rp-sub').textContent = 'Choose a new password for your account.';
    document.getElementById('rp-form').style.display = 'block';
  }
  function showInvalid() {
    document.getElementById('rp-sub').textContent = 'This reset link is invalid or has expired.';
    var err = document.getElementById('auth-error');
    err.innerHTML = 'Please request a new link from the <a href="forgot-password.html" style="color:#DC2626;font-weight:700;">Reset password</a> page.';
    err.style.display = 'block';
  }

  // Supabase fires PASSWORD_RECOVERY once it detects the recovery token in the URL.
  _supabase.auth.onAuthStateChange(function (event, session) {
    if (event === 'PASSWORD_RECOVERY' || (session && session.user)) showForm();
  });

  // Fallback: if a session is already present shortly after load, show the form;
  // otherwise treat the link as invalid/expired.
  setTimeout(async function () {
    try {
      var s = await _supabase.auth.getSession();
      if (s && s.data && s.data.session) showForm();
      else if (!RP_READY) showInvalid();
    } catch (e) { if (!RP_READY) showInvalid(); }
  }, 1200);

  async function setNewPassword(e) {
    e.preventDefault();
    var btn = document.getElementById('rp-btn');
    var errEl = document.getElementById('auth-error');
    var okEl = document.getElementById('auth-ok');
    errEl.style.display = 'none'; okEl.style.display = 'none';
    var pw1 = document.getElementById('pw1').value;
    var pw2 = document.getElementById('pw2').value;
    if (pw1.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
    if (pw1 !== pw2) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Updating…';
    try {
      var res = await _supabase.auth.updateUser({ password: pw1 });
      if (res.error) throw res.error;
      document.getElementById('rp-form').style.display = 'none';
      okEl.innerHTML = 'Your password has been updated. You can now <a href="login.html" style="color:var(--green-dark);font-weight:700;">sign in</a> with your new password.';
      okEl.style.display = 'block';
    } catch (err) {
      errEl.textContent = (err && err.message) || 'Could not update the password. Try the reset link again.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Update password →';
    }
  }
</script>
</body>
</html>
