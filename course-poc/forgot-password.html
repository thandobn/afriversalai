<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — AfriversalAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card { background: white; border-radius: var(--radius-lg); padding: 48px 44px; width: 100%; max-width: 460px; box-shadow: var(--shadow-md); }
    .auth-logo { display: block; height: 52px; width: auto; margin-bottom: 28px; }
    .auth-card h1 { font-size: 1.5em; font-weight: 800; color: var(--green-dark); margin-bottom: 6px; }
    .auth-card p.sub { color: var(--muted); font-size: 0.9em; margin-bottom: 28px; line-height: 1.6; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85em; font-weight: 600; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 0.92em; color: var(--text); background: white; }
    .form-group input:focus { outline: none; border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(45,106,79,0.1); }
    .auth-error { display: none; background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; border-radius: var(--radius); padding: 12px 14px; font-size: 0.85em; margin-bottom: 16px; }
    .auth-ok { display: none; background: var(--green-pale); border: 1px solid var(--green-light); color: var(--green-dark); border-radius: var(--radius); padding: 14px 16px; font-size: 0.88em; margin-bottom: 16px; line-height: 1.6; }
    .auth-footer { margin-top: 24px; text-align: center; font-size: 0.85em; color: var(--muted); }
    .auth-footer a { color: var(--green-mid); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body class="bg-pale">

<nav class="nav">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo"><img src="assets/logo.png" alt="AfriversalAI" class="nav__logo-img"></a>
    <ul class="nav__links">
      <li><a href="index.html">Home</a></li>
      <li class="nav__login"><a href="login.html">Log in</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <img src="assets/logo.png" alt="AfriversalAI" class="auth-logo" />
    <h1>Reset your password</h1>
    <p class="sub">Enter the email on your account and we'll send you a secure link to set a new password.</p>

    <div id="auth-error" class="auth-error" role="alert"></div>
    <div id="auth-ok" class="auth-ok" role="status"></div>

    <form id="fp-form" onsubmit="sendReset(event)">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email" />
      </div>
      <button type="submit" class="btn btn--primary btn--lg" style="width:100%; margin-top:8px;" id="fp-btn">Send reset link →</button>
    </form>

    <div class="auth-footer">
      Remembered it? <a href="login.html">Back to sign in</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2"></script>
<script src="assets/supabase-config.js"></script>
<script>
  async function sendReset(e) {
    e.preventDefault();
    var btn = document.getElementById('fp-btn');
    var errEl = document.getElementById('auth-error');
    var okEl = document.getElementById('auth-ok');
    errEl.style.display = 'none'; okEl.style.display = 'none';
    var email = document.getElementById('email').value.trim();
    if (!email) return;
    btn.disabled = true; btn.textContent = 'Sending…';
    var redirectTo = location.origin + location.pathname.replace(/[^/]*$/, 'reset-password.html');
    try {
      var res = await _supabase.auth.resetPasswordForEmail(email, { redirectTo: redirectTo });
      if (res.error) throw res.error;
      okEl.innerHTML = 'If an account exists for <strong>' + email.replace(/[<>&]/g, '') + '</strong>, a password reset link is on its way. Check your inbox (and spam) and follow the link to set a new password.';
      okEl.style.display = 'block';
      document.getElementById('fp-form').style.display = 'none';
    } catch (err) {
      errEl.textContent = (err && err.message) || 'Could not send the reset link. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Send reset link →';
    }
  }
</script>
</body>
</html>
